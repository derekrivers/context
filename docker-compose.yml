services:
  postgres:
    image: postgres:16-alpine
    container_name: context-postgres
    environment:
      POSTGRES_USER: context
      POSTGRES_PASSWORD: context
      POSTGRES_DB: context
    ports:
      - "5432:5432"
    volumes:
      - context_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U context -d context"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  context_postgres:
